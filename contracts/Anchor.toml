[features]
seeds = false
skip-lint = false

[programs.localnet]
# Program IDs will be auto-generated on first build

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
